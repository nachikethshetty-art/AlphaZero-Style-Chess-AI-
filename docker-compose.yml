services:

  backend:
    build: ./backend
    container_name: chess-ai-backend
    ports:
      - "8000:8000"

  ui:
    build: ./chess-ui
    container_name: chess-ai-ui
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: chess-ai-mlflow
    ports:
      - "5001:5000"
    command: mlflow server --host 0.0.0.0 --port 5000